<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uang Kas Digital - Login Admin</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="shortcut icon" href="images/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: "#0f5fa8",
                            600: "#0d4f8c",
                            700: "#0a3f71"
                        },
                        accent: {
                            500: "#0f8b7b"
                        }
                    },
                    boxShadow: {
                        soft: "0 12px 35px rgba(13, 79, 140, 0.12)"
                    }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(173,216,255,0.35),_transparent_40%),radial-gradient(circle_at_bottom_right,_rgba(15,139,123,0.24),_transparent_40%)]"></div>

    <main class="mx-auto grid min-h-[calc(100vh-90px)] w-[min(1150px,94vw)] place-items-center py-8">

        <section class="w-full max-w-lg rounded-3xl border border-slate-200 bg-white p-6 shadow-soft md:p-8" aria-label="Login bendahara">
            <img src="images/logok.png" alt="KasKelas" class="mx-auto h-16 w-auto object-contain" />
            <h2 class="mt-2 text-center text-3xl font-extrabold text-brand-700">KasKelas Digital</h2>
            <p class="mt-1 text-center text-sm text-slate-500">Sistem kas kelas digital terintegrasi</p>

            <form id="loginForm" class="mt-6 grid gap-3">
                <label class="text-sm font-semibold text-slate-600" for="email">Email Bendahara</label>
                <input id="email" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm focus:border-brand-400 focus:outline-none focus:ring-4 focus:ring-brand-100" type="email" placeholder="contoh@email.com" required />

                <label class="text-sm font-semibold text-slate-600" for="password">Kata Sandi</label>
                <input id="password" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm focus:border-brand-400 focus:outline-none focus:ring-4 focus:ring-brand-100" type="password" minlength="6" placeholder="Masukkan kata sandi" required />

                <button type="submit" class="mt-1 rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-brand-700">Masuk</button>
                <p id="loginMessage" class="text-sm font-semibold text-brand-700"></p>
            </form>

            <a class="mt-4 inline-block text-sm font-semibold text-brand-600 hover:text-brand-700" href="index.html">Kembali ke Halaman User</a>
        </section>
    </main>

    <footer class="mx-auto w-[min(1150px,94vw)] pb-8 text-center text-sm text-slate-500">
        <p>Dibuat oleh Filah Syahidah untuk mempermudah pengelolaan kas kelas</p>
    </footer>

    <script type="module" src="js/login.js"></script>
</body>
</html>
